# systemd drop-in: re-apply the Talk relay patch before the gateway starts.
#
# Install to:
#   ~/.config/systemd/user/openclaw-gateway.service.d/talk-relay-patch.conf
# then:
#   systemctl --user daemon-reload
#
# Why a drop-in: OpenClaw self-updates wipe the bundled dist/ AND regenerate the
# main openclaw-gateway.service unit. The .service.d/ path is separate and not
# managed by OpenClaw, so this survives. The patcher is idempotent (no-op when
# already patched).
#
# Deliberately NO leading "-": if a future openclaw update changes the bundle
# shape, the patcher fails and BLOCKS gateway start. That's the point — a loud
# boot failure beats a gateway that runs with Talk silently broken.
[Service]
ExecStartPre=/usr/bin/node /home/tris/projects/helm/scripts/apply-openclaw-talk-patch.mjs
